name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  native-images:
    name: Build Native Image (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: maven-cleaner-linux-amd64
            executable: cli/target/maven-cleaner
            archive_name: maven-cleaner-linux-amd64.tar.gz
            archive_cmd: tar -czf
          - os: windows-latest
            artifact: maven-cleaner-windows-amd64
            executable: cli/target/maven-cleaner.exe
            archive_name: maven-cleaner-windows-amd64.zip
            archive_cmd: zip
          - os: macos-15-intel
            artifact: maven-cleaner-macos-amd64
            executable: cli/target/maven-cleaner
            archive_name: maven-cleaner-macos-amd64.tar.gz
            archive_cmd: tar -czf
          - os: macos-latest
            artifact: maven-cleaner-macos-arm64
            executable: cli/target/maven-cleaner
            archive_name: maven-cleaner-macos-arm64.tar.gz
            archive_cmd: tar -czf
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@01ed653ac833fe80569f1ef9f25585ba2811baab # v1.3.3
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Build native image
        run: mvn package -pl core,cli -Pnative -DskipTests -T 4

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ${{ matrix.executable }}
          ./${{ matrix.executable }} --dry-run --skip-upstream || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: .\cli\target\maven-cleaner.exe --dry-run --skip-upstream
        shell: pwsh
        continue-on-error: true

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp ${{ matrix.executable }} staging/maven-cleaner
          chmod +x staging/maven-cleaner
          tar -czf ${{ matrix.archive_name }} -C staging maven-cleaner
          sha256sum ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item ${{ matrix.executable }} staging/maven-cleaner.exe
          Compress-Archive -Path staging/maven-cleaner.exe -DestinationPath ${{ matrix.archive_name }}
          $hash = (Get-FileHash ${{ matrix.archive_name }} -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive_name }}" | Out-File -Encoding ascii ${{ matrix.archive_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256
          retention-days: 90

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

  fat-jar:
    name: Build Universal JAR
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build fat JAR
        run: mvn package -pl core,cli -Pshade -DskipTests -T 4

      - name: Package fat JAR and launchers
        run: |
          mkdir -p staging
          cp cli/target/cli-*.jar staging/maven-cleaner.jar

          # Unix self-executing JAR (prepend shell stub)
          cat > staging/maven-cleaner <<'STUB'
          #!/bin/sh
          exec java -jar "$0" "$@"
          STUB
          cat staging/maven-cleaner.jar >> staging/maven-cleaner
          chmod +x staging/maven-cleaner

          # Windows batch launcher
          cat > staging/maven-cleaner.bat <<'BAT'
          @echo off
          java -jar "%~dp0maven-cleaner.jar" %*
          BAT

          cd staging
          sha256sum maven-cleaner.jar > maven-cleaner.jar.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: maven-cleaner-universal-jar
          path: |
            staging/maven-cleaner.jar
            staging/maven-cleaner.jar.sha256
            staging/maven-cleaner
            staging/maven-cleaner.bat
          retention-days: 90

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: |
            staging/maven-cleaner.jar
            staging/maven-cleaner.jar.sha256
            staging/maven-cleaner
            staging/maven-cleaner.bat
