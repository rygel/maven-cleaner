name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21.0.9'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run all checks
        run: ./mvnw verify -T 4

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 14

  native-image:
    name: Native Image
    needs: build-and-test
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15-intel, macos-15]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@60c26726de13f8b90771df4bc1641a52a3159994 # v1.5.2
        with:
          java-version: '25.0.2'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Build native image
        shell: bash
        run: ./mvnw package -pl core,cli -Pnative -DskipTests -T 4

      - name: Smoke test native image (Unix)
        if: runner.os != 'Windows'
        run: ./cli/target/maven-cleaner --dry-run --skip-upstream || true

      - name: Smoke test native image (Windows)
        if: runner.os == 'Windows'
        run: .\cli\target\maven-cleaner.exe --dry-run --skip-upstream
        shell: pwsh
        continue-on-error: true

      - name: Upload native image
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: maven-cleaner-${{ matrix.os }}
          path: |
            cli/target/maven-cleaner
            cli/target/maven-cleaner.exe
          retention-days: 30
