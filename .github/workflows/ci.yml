name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run all checks
        run: mvn verify -T 4

      - name: Upload JaCoCo coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 14

  native-image:
    name: Native Image
    needs: build-and-test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@01ed653ac833fe80569f1ef9f25585ba2811baab # v1.3.3
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Build native image
        run: mvn package -pl core,cli -Pnative -DskipTests -T 4

      - name: Smoke test native image (Unix)
        if: runner.os != 'Windows'
        run: ./cli/target/maven-cleaner --dry-run --skip-upstream || true

      - name: Smoke test native image (Windows)
        if: runner.os == 'Windows'
        run: .\cli\target\maven-cleaner.exe --dry-run --skip-upstream
        shell: pwsh
        continue-on-error: true

      - name: Upload native image
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: maven-cleaner-${{ matrix.os }}
          path: |
            cli/target/maven-cleaner
            cli/target/maven-cleaner.exe
          retention-days: 30
